<!DOCTYPE html>
<html>
<head>
<title>Edit Patient</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Edit Patient</h2>

<form method="POST">

<input type="text" name="full_name" value="{{patient.full_name}}" class="form-control mb-2">

<input type="date" name="dob" value="{{patient.dob}}" class="form-control mb-2">

<input type="email" name="email" value="{{patient.email}}" class="form-control mb-2">

<input type="number" step="0.01" name="glucose" value="{{patient.glucose}}" class="form-control mb-2">

<input type="number" step="0.01" name="haemoglobin" value="{{patient.haemoglobin}}" class="form-control mb-2">

<input type="number" step="0.01" name="cholesterol" value="{{patient.cholesterol}}" class="form-control mb-2">

<button class="btn btn-primary">
Update
</button>

</form>

</div>

</body>
</html>
